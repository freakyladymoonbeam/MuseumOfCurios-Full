name: Project Board Automation

on:
  project_card:
    types: [moved]

jobs:
  project-automation:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: npm install @octokit/rest

      - name: GitHub Script - Auto Label / Close
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const card_id = context.payload.project_card.id;
            const column_id = context.payload.project_card.column_id;
            
            // Replace these with your actual column IDs
            const IN_PROGRESS_COLUMN_ID = 12345678;
            const IMPLEMENTED_COLUMN_ID = 87654321;

            // Get card details
            const { data: card } = await github.rest.projects.getCard({
              card_id: card_id
            });

            if (!card.content_url) {
              console.log('Card is not linked to an issue. Skipping...');
              return;
            }

            const issue_number = card.content_url.split('/').pop();
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            if (column_id === IN_PROGRESS_COLUMN_ID) {
              console.log(`Adding label 'in-progress' to issue #${issue_number}`);
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: parseInt(issue_number),
                labels: ['in-progress']
              });
            }

            if (column_id === IMPLEMENTED_COLUMN_ID) {
              console.log(`Closing issue #${issue_number}`);
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: parseInt(issue_number),
                state: 'closed'
              });
            }
